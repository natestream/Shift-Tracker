<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shift Tracker</title>
    <link rel="stylesheet" href="time-tracker.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header-brand">
          <span class="status-dot" id="status-dot"></span>
          <span class="brand-name">Shift Tracker</span>
        </div>
        <div class="header-actions">
          <button id="pin-btn" class="pin-pill" onclick="togglePin()" title="Pin window (keep visible)">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true">
              <path
                d="M16 3a1 1 0 0 1 1 1v5.586l2.707 2.707A1 1 0 0 1 19 14h-6v6a1 1 0 0 1-2 0v-6H5a1 1 0 0 1-.707-1.707L7 9.586V4a1 1 0 0 1 1-1z"
              />
            </svg>
          </button>
        </div>
      </header>

      <!-- IDLE STATE -->
      <div id="idle-view" class="view">
        <div class="idle-hint">Ready when you are</div>

        <div id="manual-entry" class="manual-entry" style="display: none">
          <div id="manual-time" class="time-picker time-picker-lg"></div>
          <div class="manual-actions">
            <button class="btn-primary" onclick="confirmManualClockIn()">Confirm</button>
            <button class="btn-secondary cancel-x-btn" onclick="cancelManualEntry()">Cancel</button>
          </div>
        </div>

        <div id="idle-actions">
          <button id="clock-in-btn" class="clock-in-btn" onclick="clockInNow()" title="Clock in now (Alt+1)">
            Clock In Now
            <span class="shortcut-hint">Alt+1</span>
          </button>
          <button class="manual-entry-btn" onclick="openManualEntry()">Enter time manually</button>
        </div>

        <div class="divider"></div>

        <div class="goal-row goal-row-centered">
          <div class="goal-stepper-inline">
            <button onclick="decGoal()" aria-label="Decrease goal">
              <svg viewBox="0 0 12 12" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="2" y1="6" x2="10" y2="6" /></svg>
            </button>
            <span id="goal-label-idle">8h goal</span>
            <button onclick="incGoal()" aria-label="Increase goal">
              <svg viewBox="0 0 12 12" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="2" x2="6" y2="10" /><line x1="2" y1="6" x2="10" y2="6" /></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- ACTIVE STATE -->
      <div id="active-view" class="view" style="display: none">
        <div id="clockin-row-display" class="clockin-display">
          <span>Clocked in at <strong id="clockin-time-label">--:--</strong></span>
          <button class="edit-clockin-btn" onclick="openEditClockIn()">Edit</button>
        </div>
        <div id="clockin-row-edit" class="clockin-edit" style="display: none">
          <div id="edit-clockin-time" class="time-picker time-picker-md"></div>
          <button class="btn-primary btn-sm" onclick="confirmEditClockIn()">Save</button>
          <button class="btn-secondary btn-sm cancel-x-btn" onclick="cancelEditClockIn()">✕</button>
        </div>

        <div class="hero">
          <div class="hero-label">Leave at</div>
          <div class="hero-time" id="hero-time">--:--</div>
          <div class="hero-remaining" id="hero-remaining"></div>
          <div class="hero-paused-banner" id="hero-paused-banner" style="display: none">Lunch Break | Shift Paused</div>
        </div>

        <div class="progress-section">
          <div class="progress-labels">
            <span id="worked-label">0m worked</span>
            <span id="goal-label-active">8h goal</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        </div>

        <div class="section-divider"></div>

        <div class="controls-row">
          <div id="lunch-container" class="lunch-container"></div>
          <div class="goal-stepper-inline">
            <button onclick="decGoal()" aria-label="Decrease goal">
              <svg viewBox="0 0 12 12" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="2" y1="6" x2="10" y2="6" /></svg>
            </button>
            <span id="goal-label-inline">8h goal</span>
            <button onclick="incGoal()" aria-label="Increase goal">
              <svg viewBox="0 0 12 12" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="2" x2="6" y2="10" /><line x1="2" y1="6" x2="10" y2="6" /></svg>
            </button>
          </div>
        </div>

        <button id="reset-btn" class="reset-btn" onclick="requestReset()" title="Reset today's tracked day">Reset Day</button>
        <div id="reset-confirm" class="reset-confirm" style="display: none">
          <span class="reset-confirm-label">Reset today's progress?</span>
          <div class="reset-confirm-actions">
            <button class="btn-secondary btn-sm cancel-reset-btn" onclick="cancelReset()">Cancel</button>
            <button class="reset-confirm-btn" onclick="confirmReset()">Reset</button>
          </div>
        </div>
      </div>
    </div>

    <script src="time-tracker.js"></script>
    <script>
      if (window.electronAPI) {
        document.getElementById("close-btn").style.display = "flex";
      }

      function togglePin() {
        if (!window.electronAPI) {
          setPinnedVisual(!pinnedVisual);
          return;
        }
        window.electronAPI.togglePin().then(function (pinned) {
          setPinnedVisual(pinned);
        });
      }
    </script>
  </body>
</html>
