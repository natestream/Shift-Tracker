<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shift Tracker</title>
    <link rel="stylesheet" href="time-tracker.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header-brand">
          <span class="status-dot" id="status-dot"></span>
          <span class="brand-name">Shift Tracker</span>
        </div>
        <div class="header-actions">
          <button id="pin-btn" class="pin-pill" onclick="togglePin()" title="Pin window (keep visible)">Pin</button>
          <button id="close-btn" onclick="window.electronAPI?.closeWindow()" title="Close">✕</button>
        </div>
      </header>

      <!-- IDLE STATE -->
      <div id="idle-view" class="view">
        <div class="idle-hint">Ready when you are</div>

        <div id="manual-entry" class="manual-entry" style="display: none">
          <input type="time" id="manual-time" oninput="setManualTime(this.value)" />
          <div class="manual-actions">
            <button class="btn-primary" onclick="confirmManualClockIn()">Confirm</button>
            <button class="btn-secondary cancel-x-btn" onclick="cancelManualEntry()">Cancel</button>
          </div>
        </div>

        <div id="idle-actions">
          <button id="clock-in-btn" class="clock-in-btn" onclick="clockInNow()" title="Clock in now (Alt+1)">
            Clock In Now
            <span class="shortcut-hint">Alt+1</span>
          </button>
          <button class="manual-entry-btn" onclick="openManualEntry()">Enter time manually</button>
        </div>

        <div class="divider"></div>

        <div class="goal-row">
          <span class="goal-row-label">Daily goal</span>
          <div class="stepper">
            <button onclick="decGoal()">–</button>
            <span id="goal-label-idle" class="stepper-val">8h</span>
            <button onclick="incGoal()">+</button>
          </div>
        </div>
      </div>

      <!-- ACTIVE STATE -->
      <div id="active-view" class="view" style="display: none">
        <div id="clockin-row-display" class="clockin-display">
          <span>Clocked in at <strong id="clockin-time-label">--:--</strong></span>
          <button class="edit-clockin-btn" onclick="openEditClockIn()">Edit</button>
        </div>
        <div id="clockin-row-edit" class="clockin-edit" style="display: none">
          <input type="time" id="edit-clockin-time" oninput="setManualTime(this.value)" />
          <button class="btn-primary btn-sm" onclick="confirmEditClockIn()">Save</button>
          <button class="btn-secondary btn-sm cancel-x-btn" onclick="cancelEditClockIn()">✕</button>
        </div>

        <div class="hero">
          <div class="hero-label">Leave at</div>
          <div class="hero-time" id="hero-time">--:--</div>
          <div class="hero-remaining" id="hero-remaining"></div>
        </div>

        <div class="progress-section">
          <div class="progress-labels">
            <span id="worked-label">0m worked</span>
            <span id="goal-label-active">8h goal</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        </div>

        <div class="section-divider"></div>

        <div class="controls-row">
          <div id="lunch-container" class="lunch-container"></div>
          <div class="goal-stepper-inline">
            <button onclick="decGoal()">–</button>
            <span id="goal-label-inline">8h goal</span>
            <button onclick="incGoal()">+</button>
          </div>
        </div>

        <button class="reset-btn" onclick="requestReset()" title="Reset today's tracked day">Reset Day</button>
      </div>
    </div>

    <script src="time-tracker.js"></script>
    <script>
      if (window.electronAPI) {
        document.getElementById("close-btn").style.display = "flex";
      }

      function togglePin() {
        if (!window.electronAPI) {
          setPinnedVisual(!pinnedVisual);
          return;
        }
        window.electronAPI.togglePin().then(function (pinned) {
          setPinnedVisual(pinned);
        });
      }
    </script>
  </body>
</html>
